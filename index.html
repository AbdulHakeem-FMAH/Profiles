<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.0.1/remixicon.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>Messages — Farewell Karthick</title>
  <style>
    /* ══════════════════════════════════════════
       DESIGN TOKENS
    ══════════════════════════════════════════ */
    :root {
      --first-color:       hsl(230, 100%, 50%);
      --first-color-light: hsl(230, 100%, 96%);
      --second-color:      hsl(150, 100%, 38%);
      --msil-color:        hsl(280, 80%, 55%);
      --msil-color-light:  hsl(280, 80%, 95%);
      --title-color:       hsl(230, 24%, 12%);
      --text-color:        hsl(230, 10%, 55%);
      --gray-color:        hsl(230, 20%, 92%);
      --border-color:      hsl(230, 15%, 90%);
      --body-color:        hsl(230, 40%, 97%);
      --container-color:   hsl(0, 0%, 100%);
      --body-font:         "Syne", sans-serif;
      --shadow-sm:  0 2px 8px  hsla(230,40%,20%,0.08);
      --shadow-md:  0 8px 32px hsla(230,40%,20%,0.14);
      --shadow-lg:  0 20px 60px hsla(230,40%,20%,0.22);
    }

    *, ::before, ::after { box-sizing: border-box; padding: 0; margin: 0; }

    body {
      font-family: var(--body-font);
      background-color: var(--body-color);
      color: var(--text-color);
      min-height: 100vh;
    }

    a { text-decoration: none; }
    img { display: block; max-width: 100%; height: auto; }

    /* ══════════════════════════════════════════
       MESSAGES PAGE
    ══════════════════════════════════════════ */
    #messages-page { display: block; }

    /* dot-grid background */
    #messages-page::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: radial-gradient(hsla(230,40%,60%,0.13) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 200;
      background: hsla(230,40%,97%,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-color);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .topbar-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--title-color);
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    .topbar-count {
      font-size: 0.72rem;
      font-weight: 600;
      background: var(--first-color);
      color: #fff;
      padding: 0.2rem 0.55rem;
      border-radius: 20px;
    }

    .search-wrap {
      flex: 1;
      max-width: 320px;
      position: relative;
      margin-left: auto;
    }

    .search-wrap i {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      color: var(--text-color);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 0.5rem 1rem 0.5rem 2.4rem;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      background: var(--container-color);
      font-family: var(--body-font);
      font-size: 0.82rem;
      color: var(--title-color);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input:focus {
      border-color: var(--first-color);
      box-shadow: 0 0 0 3px hsla(230,100%,50%,0.1);
    }

    .filter-tabs { display: flex; gap: 0.4rem; }

    .filter-tab {
      font-family: var(--body-font);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.35rem 0.85rem;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-color);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-tab.active,
    .filter-tab:hover { background: var(--first-color); border-color: var(--first-color); color: #fff; }

    .filter-tab[data-group="MSIL"].active,
    .filter-tab[data-group="MSIL"]:hover { background: var(--msil-color); border-color: var(--msil-color); }

    .page-wrapper {
      position: relative;
      z-index: 1;
      padding: 2rem 2rem 5rem;
      max-width: 960px;
      margin: 0 auto;
    }

    .empty-state {
      display: none;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-color);
      font-size: 0.9rem;
    }

    .profiles-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1.5rem 1.25rem;
    }

    /* profile card */
    .card__article {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar-wrap { position: relative; cursor: pointer; }

    .avatar-wrap::before {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      z-index: 0;
      opacity: 0;
      transition: opacity 0.25s;
    }

    .card__article[data-group="LEXI"] .avatar-wrap::before {
      background: conic-gradient(var(--first-color), hsl(200,100%,60%), var(--first-color));
    }

    .card__article[data-group="MSIL"] .avatar-wrap::before {
      background: conic-gradient(var(--msil-color), hsl(320,80%,65%), var(--msil-color));
    }

    .card__article:hover .avatar-wrap::before {
      opacity: 1;
      animation: spin-ring 3s linear infinite;
    }

    @keyframes spin-ring { to { transform: rotate(360deg); } }

    .card__profile {
      width: 72px;
      height: 72px;
      background-color: var(--gray-color);
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      border: 3px solid var(--container-color);
      box-shadow: var(--shadow-sm);
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s;
      position: relative;
      z-index: 1;
    }

    .card__profile img { width: 68px; }

    .card__article:hover .card__profile {
      transform: translateY(-4px) scale(1.06);
      box-shadow: var(--shadow-md);
    }

    .unread-badge {
      position: absolute;
      top: -2px; right: -2px;
      width: 18px; height: 18px;
      background: hsl(0,90%,58%);
      color: #fff;
      font-size: 0.6rem;
      font-weight: 700;
      border-radius: 50%;
      border: 2px solid var(--body-color);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .online-dot {
      position: absolute;
      bottom: 2px; right: 2px;
      width: 10px; height: 10px;
      background: var(--second-color);
      border-radius: 50%;
      border: 2px solid var(--container-color);
      z-index: 10;
    }

    .online-dot::after {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: var(--second-color);
      opacity: 0.35;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%,100% { transform: scale(1); opacity: 0.35; }
      50%      { transform: scale(1.7); opacity: 0; }
    }

    .card__name-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--title-color);
      text-align: center;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    .card__group-pill {
      font-size: 0.6rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      letter-spacing: 0.04em;
    }

    .card__article[data-group="LEXI"] .card__group-pill {
      background: var(--first-color-light);
      color: var(--first-color);
    }

    .card__article[data-group="MSIL"] .card__group-pill {
      background: var(--msil-color-light);
      color: var(--msil-color);
    }

    .card__initials {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; font-weight: 700; color: var(--first-color);
    }

    /* celebrate button */
    .celebrate-btn-container { text-align: center; margin-top: 2.5rem; }

    .celebrate-btn {
      font-family: var(--body-font);
      font-size: 0.8rem;
      font-weight: 600;
      background: var(--first-color);
      padding: 0.7rem 1.4rem;
      border-radius: 0.75rem;
      color: #fff;
      display: inline-flex;
      align-items: center;
      column-gap: 0.5rem;
      border: none;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.15s;
      text-decoration: none;
    }

    .celebrate-btn:hover { background: hsl(230,100%,42%); transform: scale(1.03); }
    .celebrate-btn i { font-size: 1rem; }

    /* ── FLOATING TOOLTIP ── */
    #floating-tooltip {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.25s cubic-bezier(0.34,1.4,0.64,1);
      width: 230px;
    }

    #floating-tooltip.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    #ft-content {
      background: var(--container-color);
      border: 1px solid var(--border-color);
      border-radius: 1rem;
      box-shadow: var(--shadow-lg);
      padding: 1.25rem 1rem;
      position: relative;
    }

    #ft-arrow {
      position: absolute;
      width: 14px; height: 14px;
      background: var(--container-color);
      transform: rotate(45deg);
      border-radius: 0 0 3px 0;
    }

    #ft-arrow.arrow-down {
      bottom: -8px;
      border-right: 1px solid var(--border-color);
      border-bottom: 1px solid var(--border-color);
      top: auto;
    }

    #ft-arrow.arrow-up {
      top: -8px;
      border-left: 1px solid var(--border-color);
      border-top: 1px solid var(--border-color);
      bottom: auto;
    }

    .ft-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .ft-group-badge {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
    }

    .ft-group-badge.lexi { background: var(--first-color-light); color: var(--first-color); }
    .ft-group-badge.msil { background: var(--msil-color-light);  color: var(--msil-color); }

    .ft-time { font-size: 0.68rem; color: var(--text-color); }

    .ft-avatar {
      width: 60px; height: 60px;
      background: var(--gray-color);
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      margin: 0 auto 0.65rem;
      position: relative;
    }

    .ft-avatar img { width: 56px; }

    .ft-avatar-dot {
      width: 10px; height: 10px;
      background: var(--second-color);
      border-radius: 50%;
      border: 2px solid var(--container-color);
      position: absolute;
      bottom: 2px; right: 2px;
    }

    .ft-body { text-align: center; }

    .ft-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--title-color);
      margin-bottom: 0.15rem;
      letter-spacing: -0.01em;
    }

    .ft-sub { font-size: 0.72rem; color: var(--text-color); margin-bottom: 0.85rem; }

    .ft-btn {
      font-family: var(--body-font);
      font-size: 0.75rem;
      font-weight: 600;
      background: var(--first-color);
      padding: 0.55rem 1rem;
      border-radius: 0.6rem;
      color: #fff;
      display: inline-flex;
      align-items: center;
      column-gap: 0.35rem;
      cursor: pointer;
      border: none;
      transition: background-color 0.2s, transform 0.15s;
    }

    .ft-btn:hover { background: hsl(230,100%,42%); transform: scale(1.03); }
    .ft-btn i { font-size: 0.85rem; }

    .card__initials-sm {
      width: 56px; height: 56px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 700; color: var(--first-color);
    }

    /* ══════════════════════════════════════════
       CARD OVERLAY (full-screen)
    ══════════════════════════════════════════ */
    #card-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      background: var(--body-color);
      overflow-y: auto;
    }

    #card-overlay.visible { display: block; }

    /* dot-grid on overlay too */
    #card-overlay::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: radial-gradient(hsla(230,40%,60%,0.18) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    .confetti-wrap {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .confetti-wrap span {
      position: absolute;
      top: -12px;
      width: 8px; height: 8px;
      border-radius: 2px;
      opacity: 0;
      animation: confetti-fall linear forwards;
    }

    @keyframes confetti-fall {
      0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
      80%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(105vh) rotate(720deg) scale(0.6); }
    }

    /* back button */
    .back-btn {
      position: fixed;
      top: 1.25rem;
      left: 1.5rem;
      z-index: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--body-font);
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-color);
      background: var(--container-color);
      border: 1px solid var(--border-color);
      padding: 0.45rem 0.9rem;
      border-radius: 10px;
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: color 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    .back-btn:hover {
      color: var(--first-color);
      box-shadow: var(--shadow-md);
      transform: translateX(-2px);
    }

    .back-btn i { font-size: 0.95rem; }

    /* card scene */
    .overlay-scene {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 5rem 1rem 3rem;
    }

    .from-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-color);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      transform: translateY(-6px);
      animation: fadeDown 0.5s 0.2s ease forwards;
    }

    .from-label::before,
    .from-label::after {
      content: "";
      width: 32px;
      height: 1px;
      background: var(--border-color);
    }

    @keyframes fadeDown { to { opacity: 1; transform: translateY(0); } }

    /* greeting card */
    .greeting-card {
      width: 360px;
      background: var(--container-color);
      border-radius: 1.5rem;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      opacity: 0;
      transform: translateY(24px) scale(0.97);
      animation: cardIn 0.55s 0.35s cubic-bezier(0.34,1.4,0.64,1) forwards;
    }

    @keyframes cardIn { to { opacity: 1; transform: translateY(0) scale(1); } }

    .card__accent {
      height: 4px;
      background: linear-gradient(90deg, var(--first-color), hsl(200,100%,60%));
      border-radius: 4px 4px 0 0;
    }

    .card__img-area {
      height: 200px;
      background: var(--body-color);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid var(--border-color);
    }

    .card__img-area::before {
      content: "";
      position: absolute;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, hsla(230,100%,70%,0.15) 0%, transparent 70%);
      animation: glow-pulse 3s ease-in-out infinite;
    }

    @keyframes glow-pulse {
      0%,100% { transform: scale(1);    opacity: 1; }
      50%      { transform: scale(1.15); opacity: 0.6; }
    }

    .card__memoji {
      width: 160px;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 8px 20px hsla(230,40%,20%,0.18));
      transform: translateY(8px);
      transition: transform 0.5s cubic-bezier(0.34,1.4,0.64,1);
      border-radius: 50%;
    }

    .greeting-card:hover .card__memoji { transform: translateY(-6px) rotate(-6deg) scale(1.06); }

    /* memoji placeholder (initials circle when no image) */
    .card__memoji-initials {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: var(--first-color-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--first-color);
      position: relative;
      z-index: 1;
    }

    .card__body { padding: 1.5rem 1.5rem 1.75rem; }

    .card__sender {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      background: var(--first-color-light);
      color: var(--first-color);
      padding: 0.2rem 0.65rem;
      border-radius: 20px;
      margin-bottom: 0.9rem;
    }

    .card__sender-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--second-color);
    }

    .card__title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--title-color);
      letter-spacing: -0.02em;
      line-height: 1.25;
      margin-bottom: 0.75rem;
    }

    .card__title span {
      background: linear-gradient(90deg, var(--first-color), hsl(200,100%,60%));
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .card__description {
      font-size: 0.83rem;
      line-height: 1.75;
      color: var(--text-color);
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.55s cubic-bezier(0.4,0,0.2,1),
                  opacity 0.4s 0.1s ease,
                  transform 0.4s 0.1s ease;
      opacity: 0;
      transform: translateY(8px);
    }

    .greeting-card.open .card__description {
      max-height: 400px;
      opacity: 1;
      transform: translateY(0);
    }

    .card__divider {
      height: 1px;
      background: var(--border-color);
      margin: 1rem 0;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s 0.15s ease;
    }

    .greeting-card.open .card__divider { transform: scaleX(1); }

    .card__hint {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text-color);
      opacity: 0.7;
      transition: opacity 0.3s;
    }

    .greeting-card.open .card__hint { opacity: 0; height: 0; overflow: hidden; }

    .card__hint i { font-size: 0.85rem; animation: tap-nudge 1.6s ease-in-out infinite; }

    @keyframes tap-nudge {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.25); }
    }

    .card__footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.5rem;
      border-top: 1px solid var(--border-color);
      background: var(--body-color);
    }

    .card__timestamp {
      font-size: 0.68rem;
      color: var(--text-color);
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .card__timestamp i { font-size: 0.8rem; }

    .card__react { display: flex; gap: 0.5rem; }

    .react-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border-color);
      background: var(--container-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.34,1.6,0.64,1), box-shadow 0.2s, background 0.2s;
    }

    .react-btn:hover { transform: scale(1.25); box-shadow: var(--shadow-md); background: var(--first-color-light); }

    .react-btn.active {
      background: var(--first-color-light);
      border-color: hsla(230,100%,50%,0.3);
      animation: pop 0.35s cubic-bezier(0.34,1.6,0.64,1);
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.4); }
      100% { transform: scale(1.25); }
    }

    .tagline {
      margin-top: 1.5rem;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-color);
      opacity: 0;
      animation: fadeDown 0.5s 0.8s ease forwards;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .tagline i {
      font-size: 0.85rem;
      color: var(--first-color);
      animation: heartbeat 1.5s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      25%      { transform: scale(1.25); }
      50%      { transform: scale(1); }
      75%      { transform: scale(1.15); }
    }

    /* ══════════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════════ */
    @media screen and (max-width: 700px) {
      .profiles-grid { grid-template-columns: repeat(4, 1fr); gap: 1.5rem 1rem; }
      .filter-tabs { display: none; }
    }

    @media screen and (max-width: 480px) {
      .profiles-grid { grid-template-columns: repeat(3, 1fr); gap: 1.5rem 0.75rem; }
      .greeting-card { width: calc(100vw - 2rem); }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     FLOATING TOOLTIP (shared, JS-positioned)
═══════════════════════════════════════════════════ -->
<div id="floating-tooltip">
  <div id="ft-content">
    <div id="ft-arrow" class="arrow-down"></div>
    <div class="ft-header">
      <span class="ft-group-badge lexi" id="ft-group">LEXI</span>
      <span class="ft-time">Just now</span>
    </div>
    <div class="ft-body">
      <div class="ft-avatar" id="ft-avatar">
        <span class="ft-avatar-dot"></span>
      </div>
      <h2 class="ft-name" id="ft-name"></h2>
      <p class="ft-sub">1 Unread Message</p>
      <button class="ft-btn" id="ft-btn" onclick="openCard(currentProfileIndex)">
        <i class="ri-message-3-line"></i> View message
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     MESSAGES PAGE
═══════════════════════════════════════════════════ -->
<div id="messages-page">
  <div class="topbar">
    <span class="topbar-title">Messages</span>
    <span class="topbar-count" id="count-badge">25</span>
    <div class="search-wrap">
      <i class="ri-search-line"></i>
      <input class="search-input" type="text" id="search-input" placeholder="Search people...">
    </div>
    <div class="filter-tabs">
      <button class="filter-tab active" data-group="ALL">All</button>
      <button class="filter-tab" data-group="LEXI">LEXI</button>
      <button class="filter-tab" data-group="MSIL">MSIL</button>
    </div>
  </div>

  <div class="page-wrapper">
    <div class="profiles-grid" id="profiles-container"></div>
    <div class="empty-state" id="empty-state">No people found.</div>
    <div class="celebrate-btn-container">
      <a href="https://abdulhakeem-fmah.github.io/Farewell/" class="celebrate-btn" target="_blank">
        <i class="ri-bard-fill"></i>
        <span>Celebrate!</span>
      </a>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     CARD OVERLAY
═══════════════════════════════════════════════════ -->
<div id="card-overlay">
  <div class="confetti-wrap" id="confetti-wrap"></div>

  <button class="back-btn" onclick="closeCard()">
    <i class="ri-arrow-left-line"></i> Back
  </button>

  <div class="overlay-scene">
    <p class="from-label" id="overlay-from-label">A farewell message for you</p>

    <div class="greeting-card" id="greeting-card">
      <div class="card__accent"></div>

      <div class="card__img-area" id="card-img-area">
        <!-- image or initials injected by JS -->
      </div>

      <div class="card__body">
        <div class="card__sender" id="card-sender">
          <span class="card__sender-dot"></span>
          <span id="card-sender-text">From … · LEXI</span>
        </div>

        <h1 class="card__title">Farewell, <span>Karthick!</span></h1>

        <div class="card__hint">
          <i class="ri-hand-coin-line"></i>
          <span>Tap the card to read the message</span>
        </div>

        <div class="card__divider"></div>

        <p class="card__description" id="card-message">
          <!-- message injected by JS -->
        </p>
      </div>

      <div class="card__footer">
        <span class="card__timestamp">
          <i class="ri-time-line"></i> Just now
        </span>
        <div class="card__react">
          <button class="react-btn" title="Wave goodbye"   onclick="toggleReact(this,event)">👋</button>
          <button class="react-btn" title="Celebration"    onclick="toggleReact(this,event)">🎉</button>
          <button class="react-btn" title="Heart"          onclick="toggleReact(this,event)">❤️</button>
        </div>
      </div>
    </div>

    <p class="tagline">
      <i class="ri-heart-fill"></i>
      With love from the team
    </p>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     JAVASCRIPT
═══════════════════════════════════════════════════ -->
<script>
  /* ─────────────────────────────────────────────────

  const profiles = [

    },
    {

      message: `[Subhadhitya's farewell message for Karthick goes here.]`
    },
    {
      name: "Dolly",
      group: "LEXI",
      img: "assets/img/Memoji1.png",
      message: `[Dolly's farewell message for Karthick goes here.]`
    },
    {
      name: "Amal",
      group: "LEXI",
      img: "assets/img/Memoji3.png",
      message: `[Amal's farewell message for Karthick goes here.]`
    },
    {
      name: "Ananya",
      group: "LEXI",
      img: "assets/img/Memoji2.png",
      message: `[Ananya's farewell message for Karthick goes here.]`
    }
  ];

  /* ─────────────────────────────────────────────────
     HELPERS
  ───────────────────────────────────────────────── */
  function initials(name) {
    return name.split(" ").map(w => w[0]).slice(0,2).join("").toUpperCase();
  }

  /* ─────────────────────────────────────────────────
     MESSAGES PAGE — render
  ───────────────────────────────────────────────── */
  const container    = document.getElementById("profiles-container");
  const searchInput  = document.getElementById("search-input");
  const filterTabs   = document.querySelectorAll(".filter-tab");
  const countBadge   = document.getElementById("count-badge");
  const emptyState   = document.getElementById("empty-state");

  const floatTip     = document.getElementById("floating-tooltip");
  const ftGroup      = document.getElementById("ft-group");
  const ftAvatar     = document.getElementById("ft-avatar");
  const ftName       = document.getElementById("ft-name");
  const ftArrow      = document.getElementById("ft-arrow");

  const TIP_W = 230, GAP = 10;
  let hideTimer = null;
  let currentProfileIndex = -1;

  function showTooltip(avatarEl, p, idx) {
    clearTimeout(hideTimer);
    currentProfileIndex = idx;

    ftName.textContent   = p.name;
    ftGroup.textContent  = p.group;
    ftGroup.className    = "ft-group-badge " + p.group.toLowerCase();

    const dot = ftAvatar.querySelector(".ft-avatar-dot");
    ftAvatar.innerHTML = "";
    ftAvatar.appendChild(dot);

    if (p.img) {
      const img = document.createElement("img");
      img.src = p.img;
      img.alt = p.name;
      img.onerror = () => {
        img.remove();
        const d = document.createElement("div");
        d.className   = "card__initials-sm";
        d.textContent = initials(p.name);
        ftAvatar.insertBefore(d, dot);
      };
      ftAvatar.insertBefore(img, dot);
    } else {
      const d = document.createElement("div");
      d.className   = "card__initials-sm";
      d.textContent = initials(p.name);
      ftAvatar.insertBefore(d, dot);
    }

    requestAnimationFrame(() => {
      const rect    = avatarEl.getBoundingClientRect();
      const tipH    = floatTip.offsetHeight || 220;
      const avCX    = rect.left + rect.width / 2;
      const MARGIN  = 8;

      const spaceAbove = rect.top - GAP;
      let tipTop, arrowClass;

      if (spaceAbove >= tipH) {
        tipTop     = rect.top - tipH - GAP;
        arrowClass = "arrow-down";
      } else {
        tipTop     = rect.bottom + GAP;
        arrowClass = "arrow-up";
      }

      ftArrow.className = arrowClass;

      let tipLeft  = avCX - TIP_W / 2;
      tipLeft      = Math.max(MARGIN, Math.min(tipLeft, window.innerWidth - TIP_W - MARGIN));
      const arPos  = Math.max(20, Math.min(avCX - tipLeft, TIP_W - 20));
      ftArrow.style.left      = arPos + "px";
      ftArrow.style.transform = "translateX(-50%) rotate(45deg)";

      floatTip.style.left = tipLeft + "px";
      floatTip.style.top  = tipTop  + "px";
      floatTip.classList.add("visible");
    });
  }

  function hideTooltip() {
    hideTimer = setTimeout(() => floatTip.classList.remove("visible"), 120);
  }

  floatTip.addEventListener("mouseenter", () => clearTimeout(hideTimer));
  floatTip.addEventListener("mouseleave", hideTooltip);

  let activeGroup = "ALL";

  function buildProfileCard(p, index, globalIdx) {
    const avatarHTML = p.img
      ? `<img src="${p.img}" alt="${p.name}" onerror="this.parentNode.innerHTML='<div class=\\'card__initials\\'>${initials(p.name)}</div>'">`
      : `<div class="card__initials">${initials(p.name)}</div>`;

    const article = document.createElement("article");
    article.className          = "card__article";
    article.dataset.group      = p.group;
    article.style.animationDelay = `${index * 0.035}s`;

    article.innerHTML = `
      <div class="avatar-wrap">
        <div class="card__profile">${avatarHTML}</div>
        <span class="unread-badge">1</span>
        <span class="online-dot"></span>
      </div>
      <span class="card__name-label">${p.name}</span>
      <span class="card__group-pill">${p.group}</span>
    `;

    const wrap = article.querySelector(".avatar-wrap");
    wrap.addEventListener("mouseenter", () => showTooltip(wrap, p, globalIdx));
    wrap.addEventListener("mouseleave", hideTooltip);

    /* also open card on avatar click (mobile-friendly) */
    wrap.addEventListener("click", () => openCard(globalIdx));

    return article;
  }

  function render() {
    const query = searchInput.value.trim().toLowerCase();
    container.innerHTML = "";
    floatTip.classList.remove("visible");

    const filtered = profiles
      .map((p, i) => ({ p, i }))
      .filter(({ p }) =>
        (activeGroup === "ALL" || p.group === activeGroup) &&
        p.name.toLowerCase().includes(query)
      );

    countBadge.textContent       = filtered.length;
    emptyState.style.display     = filtered.length === 0 ? "block" : "none";

    filtered.forEach(({ p, i }, visIdx) => {
      container.appendChild(buildProfileCard(p, visIdx, i));
    });
  }

  filterTabs.forEach(tab => {
    tab.addEventListener("click", () => {
      filterTabs.forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      activeGroup = tab.dataset.group;
      render();
    });
  });

  searchInput.addEventListener("input", render);
  render();

  /* ─────────────────────────────────────────────────
     CARD OVERLAY
  ───────────────────────────────────────────────── */
  const overlay     = document.getElementById("card-overlay");
  const greetCard   = document.getElementById("greeting-card");
  const cardImgArea = document.getElementById("card-img-area");
  const cardSender  = document.getElementById("card-sender-text");
  const cardMsg     = document.getElementById("card-message");
  const confWrap    = document.getElementById("confetti-wrap");

  function openCard(idx) {
    if (idx < 0 || idx >= profiles.length) return;

    floatTip.classList.remove("visible");
    const p = profiles[idx];

    /* populate sender */
    cardSender.textContent = `From ${p.name} · ${p.group}`;

    /* populate message */
    cardMsg.textContent = p.message;

    /* populate image area */
    cardImgArea.innerHTML = "";
    if (p.img) {
      const img = document.createElement("img");
      img.src   = p.img;
      img.alt   = p.name;
      img.className = "card__memoji";
      img.onerror = () => {
        img.remove();
        const d = document.createElement("div");
        d.className   = "card__memoji-initials";
        d.textContent = initials(p.name);
        cardImgArea.appendChild(d);
      };
      cardImgArea.appendChild(img);
    } else {
      const d = document.createElement("div");
      d.className   = "card__memoji-initials";
      d.textContent = initials(p.name);
      cardImgArea.appendChild(d);
    }

    /* reset card state */
    greetCard.classList.remove("open");

    /* show overlay */
    overlay.classList.add("visible");
    document.body.style.overflow = "hidden";

    /* auto-open the card after a short delay */
    setTimeout(() => {
      greetCard.classList.add("open");
      spawnConfetti();
    }, 1200);
  }

  function closeCard() {
    overlay.classList.remove("visible");
    document.body.style.overflow = "";
    greetCard.classList.remove("open");
    confWrap.innerHTML = "";
  }

  /* toggle open/close on click */
  greetCard.addEventListener("click", () => {
    greetCard.classList.toggle("open");
    if (greetCard.classList.contains("open")) spawnConfetti();
  });

  /* ─────────────────────────────────────────────────
     REACT BUTTONS
  ───────────────────────────────────────────────── */
  function toggleReact(btn, event) {
    event.stopPropagation();
    btn.classList.toggle("active");
  }

  /* ─────────────────────────────────────────────────
     CONFETTI
  ───────────────────────────────────────────────── */
  function spawnConfetti() {
    const colors = [
      "hsl(230,100%,60%)", "hsl(200,100%,60%)", "hsl(150,100%,45%)",
      "hsl(280,80%,65%)",  "hsl(340,90%,65%)",  "hsl(45,100%,60%)"
    ];
    for (let i = 0; i < 60; i++) {
      const el = document.createElement("span");
      el.style.left               = Math.random() * 100 + "vw";
      el.style.background         = colors[Math.floor(Math.random() * colors.length)];
      el.style.width              = (6 + Math.random() * 8) + "px";
      el.style.height             = (6 + Math.random() * 8) + "px";
      el.style.borderRadius       = Math.random() > 0.5 ? "50%" : "2px";
      el.style.animationDuration  = (1.8 + Math.random() * 1.8) + "s";
      el.style.animationDelay     = (Math.random() * 0.6) + "s";
      confWrap.appendChild(el);
      el.addEventListener("animationend", () => el.remove());
    }
  }

  /* close overlay on Escape key */
  document.addEventListener("keydown", e => {
    if (e.key === "Escape" && overlay.classList.contains("visible")) closeCard();
  });
</script>
